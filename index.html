<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס הזמנת פאות</title>

<style>
:root {
  --bg: #f8f4ef;
  --card: #ffffff;
  --text: #2f241d;
  --muted: #7a685b;
  --accent: #c9a36b;
  --accent-dark: #9a7749;
  --border: #eadfd3;
  --shadow: 0 20px 50px rgba(86, 58, 30, 0.12);
  --radius: 20px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #fbf7f2 0%, #f3e9de 100%);
  color: var(--text);
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 30px 16px 50px;
}

.hero {
  text-align: center;
  margin-bottom: 30px;
}

.hero h1 {
  margin: 0 0 12px;
  font-size: clamp(30px, 4vw, 44px);
  font-weight: 800;
}

.hero p {
  margin: 0 auto;
  max-width: 640px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.8;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 26px;
}

.section-title {
  font-size: 22px;
  margin: 0 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.field, .full {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.full {
  grid-column: 1 / -1;
}

label {
  font-weight: 700;
  font-size: 14px;
}

input, select, textarea {
  border: 1px solid #d8c9b9;
  border-radius: 14px;
  padding: 14px;
  font-size: 15px;
  transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201, 163, 107, 0.2);
}

textarea {
  min-height: 120px;
}

.actions {
  margin-top: 26px;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 999px;
  font-size: 17px;
  font-weight: bold;
  background: linear-gradient(180deg, var(--accent), var(--accent-dark));
  color: white;
  cursor: pointer;
}

.note {
  margin-top: 10px;
  font-size: 13px;
  color: var(--muted);
}

.badge {
  background: #f3eadf;
  color: var(--accent-dark);
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold;
}

.footer {
  margin-top: 20px;
  text-align: center;
  color: var(--muted);
}

@media (max-width: 720px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<div class="badge">טופס הזמנה מקוון</div>
<h1>הזמנת פאה בהתאמה אישית</h1>
<p>
מלאי את הפרטים בטופס ואשלח אלייך מענה מסודר לגבי ההזמנה.
</p>
</div>

<form class="card"
action="https://formsubmit.co/a0bddc90674908368a9aa5e367458096"
method="POST"
accept-charset="UTF-8">

<input type="hidden" name="_subject" value="הזמנת פאה חדשה מהטופס">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://wigs-by-margalit.netlify.app/thank-you.html">
<input type="hidden" name="_autoresponse" value="קיבלנו את ההזמנה שלך ונחזור אלייך בהקדם ❤️">
<input type="hidden" name="_honey" value="">

<h2 class="section-title">פרטים אישיים</h2>

<div class="grid">
<div class="field">
<label for="full_name">שם ושם משפחה</label>
<input id="full_name" name="full_name" type="text" required>
</div>

<div class="field">
<label for="phone">טלפון</label>
<input id="phone" name="phone" type="tel" required>
</div>

<div class="full">
<label for="email">מייל</label>
<input id="email" name="email" type="email" required>
</div>

<div class="full">
<label for="address">כתובת מלאה</label>
<textarea id="address" name="address" required></textarea>
</div>
</div>

<h2 class="section-title">פרטי ההזמנה</h2>

<div class="grid">
<div class="field">
<label for="wig_choice">בחירת פאה</label>
<select id="wig_choice" name="wig_choice" required>
<option value="" disabled selected>בחרי דגם</option>
<option>פאה קצרה</option>
<option>פאה בינונית</option>
<option>פאה ארוכה</option>
<option>פאה בהתאמה אישית</option>
</select>
</div>

<div class="field">
<label for="cap_size">גודל רשת</label>
<select id="cap_size" name="cap_size" required>
<option value="" disabled selected>בחרי מידה</option>
<option>S</option>
<option>M</option>
<option>L</option>
</select>
</div>

<div class="field">
<label for="wig_length">אורך הפאה</label>
<select id="wig_length" name="wig_length" required>
<option value="" disabled selected>בחרי אורך</option>
<option>10</option>
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
<option>22</option>
<option>24</option>
<option>26</option>
</select>
</div>

<div class="field">
<label for="wig_color">צבע הפאה</label>
<input id="wig_color" name="wig_color" type="text" required>
</div>

<div class="field">
<label for="highlight_color">צבע הגוונים</label>
<input id="highlight_color" name="highlight_color" type="text" required>
</div>

<div class="field">
<label for="lace_type">סוג לייס</label>
<select id="lace_type" name="lace_type" required>
<option value="" disabled selected>בחרי סוג</option>
<option>רגיל</option>
<option>מקופל</option>
</select>
</div>

<div class="field">
<label for="hair_type">סוג שיער</label>
<select id="hair_type" name="hair_type" required>
<option value="" disabled selected>בחרי סוג</option>
<option>מתולתל</option>
<option>גלי</option>
<option>חלק</option>
</select>
</div>

<div class="full">
<label for="notes">הערות נוספות</label>
<textarea id="notes" name="notes"></textarea>
</div>
</div>

<div class="actions">
<button type="submit">שליחת ההזמנה</button>
</div>

</form>


</div>

</body>
</html>
