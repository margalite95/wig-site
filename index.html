<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס הזמנת פאות</title>

<style>
:root {
  --bg: #f8f4ef;
  --card: #ffffff;
  --text: #2f241d;
  --muted: #7a685b;
  --accent: #c9a36b;
  --accent-dark: #9a7749;
  --border: #eadfd3;
  --shadow: 0 20px 50px rgba(86, 58, 30, 0.12);
  --radius: 20px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #fbf7f2 0%, #f3e9de 100%);
  color: var(--text);
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 30px 16px 50px;
}

.hero {
  text-align: center;
  margin-bottom: 30px;
}

.hero h1 {
  font-size: 42px;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 26px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.field, .full {
  display: flex;
  flex-direction: column;
}

.full {
  grid-column: 1 / -1;
}

input, select, textarea {
  padding: 14px;
  border-radius: 14px;
  margin-top: 6px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 999px;
  background: linear-gradient(180deg, var(--accent), var(--accent-dark));
  color: white;
  border: none;
  font-size: 17px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>הזמנת פאה בהתאמה אישית</h1>
</div>

<form action="https://formsubmit.co/a0bddc90674908368a9aa5e367458096"
method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="thank-you.html">
<input type="hidden" name="_template" value="box">

<!-- 👇 השדה הכי חשוב -->
<input type="hidden" name="message">

<h2>פרטים אישיים</h2>

<div class="grid">
<div class="field">
<label>שם מלא</label>
<input name="full_name" required>
</div>

<div class="field">
<label>טלפון</label>
<input name="phone" required>
</div>

<div class="full">
<label>מייל</label>
<input type="email" name="email" required>
</div>

<div class="full">
<label>כתובת</label>
<textarea name="address" required></textarea>
</div>
</div>

<h2>פרטי הזמנה</h2>

<div class="grid">
<div class="field">
<label>בחירת פאה</label>
<select name="wig_choice">
<option>קצרה</option>
<option>בינונית</option>
<option>ארוכה</option>
</select>
</div>

<div class="field">
<label>מידה</label>
<select name="cap_size">
<option>S</option>
<option>M</option>
<option>L</option>
</select>
</div>

<div class="field">
<label>אורך</label>
<select name="wig_length">
<option>12</option>
<option>14</option>
<option>16</option>
<option>18</option>
<option>20</option>
</select>
</div>

<div class="field">
<label>צבע</label>
<input name="wig_color">
</div>

<div class="field">
<label>גוונים</label>
<input name="highlight_color">
</div>

<div class="field">
<label>סוג שיער</label>
<select name="hair_type">
<option>חלק</option>
<option>גלי</option>
<option>מתולתל</option>
</select>
</div>

<div class="full">
<label>הערות</label>
<textarea name="notes"></textarea>
</div>
</div>

<button>שליחת הזמנה</button>

</form>

</div>

<script>
document.querySelector("form").addEventListener("submit", function() {

  const msg =
  "שם: " + full_name.value + "\n" +
  "טלפון: " + phone.value + "\n" +
  "מייל: " + email.value + "\n" +
  "כתובת: " + address.value + "\n" +
  "פאה: " + wig_choice.value + "\n" +
  "מידה: " + cap_size.value + "\n" +
  "אורך: " + wig_length.value + "\n" +
  "צבע: " + wig_color.value + "\n" +
  "גוונים: " + highlight_color.value + "\n" +
  "שיער: " + hair_type.value + "\n" +
  "הערות: " + notes.value;

  document.querySelector('[name="message"]').value = msg;
});
</script>

</body>
</html>
