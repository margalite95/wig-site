<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Heebo", Arial, sans-serif;
  color: #fff8ec;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 22px;
  background:
    radial-gradient(circle at top, rgba(215,181,109,0.30), transparent 38%),
    linear-gradient(180deg, #0c0905, #000);
}

.box {
  width: min(560px, 100%);
  padding: 44px 28px;
  border-radius: 34px;
  border: 1px solid rgba(255, 215, 128, 0.25);
  background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  backdrop-filter: blur(18px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
}

.icon {
  width: 78px;
  height: 78px;
  margin: 0 auto 18px;
  border-radius: 24px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, #fff0b8, #d7b56d, #8f5c20);
  color: #151006;
  font-size: 38px;
  font-weight: 900;
}

h1 {
  margin: 0;
  font-size: clamp(30px, 6vw, 46px);
  line-height: 1.1;
  background: linear-gradient(90deg, #fff0b8, #d7b56d, #9a6425);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  margin: 16px auto 0;
  color: #c7bda8;
  font-size: 18px;
  line-height: 1.7;
  max-width: 430px;
}

.actions {
  margin-top: 28px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

a {
  text-decoration: none;
  border-radius: 18px;
  padding: 14px 20px;
  font-weight: 900;
}

.home {
  background: linear-gradient(135deg, #fff0b8, #d7b56d, #8f5c20);
  color: #151006;
}

.wa {
  color: #fff8ec;
  border: 1px solid rgba(255, 215, 128, 0.25);
  background: rgba(255,255,255,0.06);
}

@media (max-width: 520px) {
  .actions {
    flex-direction: column;
  }

  a {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="box">
  <div class="icon">✓</div>

  <h1>ההזמנה נשלחה בהצלחה</h1>

  <p>
    תודה שפנית ל־MagWigs. קיבלנו את הפרטים ונחזור אלייך בהקדם עם התאמה אישית.

  <div class="actions">
    <a class="home" href="index-test.html">חזרה לאתר</a>

</html>
